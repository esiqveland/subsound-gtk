name: publish-flatpak

on:
  push:
    tags: ['v*']

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Builds inside the correct GNOME SDK container (Platform 49 + openjdk25 extension)
      - uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.subsound.Subsound.flatpak
          manifest-path: org.subsound.Subsound.yml
          run-tests: false
          repository-name: subsound-beta
          repository-url: https://esiqveland.github.io/subsound-gtk-repo/

      # Generate static deltas so updates only download changed objects
      - name: Add static deltas
        run: flatpak build-update-repo repo --generate-static-deltas

      # Push the OSTree repo directory to the hosting GitHub repo.
      # clean: false is critical — OSTree is append-only; deleting old objects
      # breaks existing installations mid-update.
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: esiqveland/subsound-gtk-repo
          ssh-key: ${{ secrets.FLATPAK_REPO_DEPLOY_KEY }}
          branch: main
          folder: repo
          clean: false